root = "."
tmp_dir = "tmp"

[build]
  # Build with the `dev` tag so the server doesn't require frontend/dist to
  # exist (Vite serves the frontend in dev).
  cmd = "go build -tags dev -o ./tmp/distry ."
  bin = "./tmp/distry"
  delay = 200
  include_ext = ["go"]
  exclude_dir = ["tmp", "frontend", "docs"]
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
